# Three containers: web (Vue + nginx), api (ASP.NET Core), sqlserver (SQL Server).
#
# Apple Silicon (M-series) has no native SQL Server build, so it runs as a
# linux/amd64 image under Rancher/Docker Desktop's VZ + Rosetta emulation.
#
# First time:  cp .env.example .env  and fill in the secrets (the api refuses weak/missing ones).
# Launch the whole stack:        docker compose up --build        -> web on http://localhost:3000
# Launch pieces individually:
#   docker compose up -d sqlserver          # just the database (:1433)
#   docker compose up -d --build api        # database + API (:8080); pulls sqlserver via depends_on
#   docker compose up -d --build web        # full stack (:3000); pulls api + sqlserver
#
# Override secrets/config with env vars (see the api service below).
name: csub-runner-roadmap-v2

services:
  # ---- Frontend: built Vue app served by nginx, which proxies /api -> api ----
  web:
    build:
      context: ./client
      # Vite inlines these at build time. Set them in .env to enable Azure AD SSO
      # or (only for a non-prod build) the break-glass dev-login form.
      args:
        VITE_AZURE_AD_CLIENT_ID: "${VITE_AZURE_AD_CLIENT_ID:-}"
        VITE_AZURE_AD_TENANT_ID: "${VITE_AZURE_AD_TENANT_ID:-}"
        VITE_AZURE_AD_REDIRECT_URI: "${VITE_AZURE_AD_REDIRECT_URI:-}"
        VITE_ALLOW_DEV_LOGIN: "${VITE_ALLOW_DEV_LOGIN:-false}"
    container_name: csub-web
    depends_on:
      api:
        condition: service_healthy
    environment:
      # Where nginx forwards /api calls. The compose service name resolves on the
      # internal network; override to point at a different backend.
      API_URL: "${WEB_API_URL:-http://api:8080}"
    ports:
      # Host 3000 -> container 8080 (the unprivileged nginx listens on 8080).
      - "3000:8080"
    restart: unless-stopped

  # ---- Backend: ASP.NET Core API (creates DB + schema + seed on startup) ----
  api:
    build:
      context: ./Api
    container_name: csub-api
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # This compose stack owns its own throwaway SQL Server container, so the api may
      # CREATE DATABASE here. Real deployments (external SQL Server, DBA-provisioned DB)
      # use docker-compose.prod.yml, which turns this off — see docs/DEPLOYMENT.md.
      Database__AutoCreate: "true"
      # App secrets are REQUIRED (no weak defaults). `${VAR:?msg}` makes compose fail with
      # the message if the var is unset — copy .env.example to .env and fill these in.
      # Exception: the SA password defaults to the committed non-secret dev value (same as the
      # sqlserver service below) so `docker compose up -d sqlserver` works with zero setup;
      # compose interpolates the whole file even for a single-service `up`, so both uses must
      # default in lockstep. Override MSSQL_SA_PASSWORD in .env to change both at once.
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=csub_admissions;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Csub_Local_Dev_2026!};TrustServerCertificate=True;Encrypt=False"
      Jwt__Secret: "${JWT_SECRET:?set JWT_SECRET to a random 32+ character string in .env}"
      Admin__DefaultEmail: "${ADMIN_DEFAULT_EMAIL:-admin@csub.edu}"
      Admin__DefaultPassword: "${ADMIN_DEFAULT_PASSWORD:?set ADMIN_DEFAULT_PASSWORD in .env}"
      ApiCheck__EncryptionKey: "${API_CHECK_ENCRYPTION_KEY:?set API_CHECK_ENCRYPTION_KEY to 64 hex chars in .env}"
      # Break-glass local admin login is DISABLED unless BOTH are set (leave unset to keep off).
      LocalLogin__Username: "${LOCAL_LOGIN_USERNAME:-}"
      LocalLogin__Password: "${LOCAL_LOGIN_PASSWORD:-}"
      # Optional Azure AD SSO (backend token validation) — set in .env to enable.
      AzureAd__ClientId: "${AZURE_AD_CLIENT_ID:-}"
      AzureAd__TenantId: "${AZURE_AD_TENANT_ID:-}"
      # Optional: CORS origin (only if the SPA is served from a different origin).
      Cors__Origin: "${CORS_ORIGIN:-}"
      # Optional: seeded integration client (name + key) for the inbound push API.
      Integration__DefaultName: "${INTEGRATION_DEFAULT_NAME:-}"
      Integration__DefaultKey: "${INTEGRATION_DEFAULT_KEY:-}"
    ports:
      # Bound to localhost: the browser reaches the API through the web container's
      # nginx proxy; the published port is only for direct local debugging.
      - "127.0.0.1:8080:8080"
    restart: unless-stopped

  # ---- Database: SQL Server 2022 ----
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: csub-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      # Defaults to the committed non-secret dev password so `docker compose up -d sqlserver`
      # works with zero setup for the host-process dev loop (dotnet run / dotnet test). The
      # api service above still REQUIRES real secrets, so the full stack is unaffected. This is
      # a throwaway Developer-edition container bound to localhost only; production uses
      # docker-compose.prod.yml, which has no sqlserver service.
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Csub_Local_Dev_2026!}"
      MSSQL_PID: "Developer"
    ports:
      # Localhost only — not exposed to the network.
      - "127.0.0.1:1433:1433"
    restart: unless-stopped
    volumes:
      - csub_sqlserver_data:/var/opt/mssql
    healthcheck:
      # $$ defers expansion to the container shell, which has MSSQL_SA_PASSWORD set
      # from the environment block above (no fallback — compose already required it).
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

volumes:
  csub_sqlserver_data:
