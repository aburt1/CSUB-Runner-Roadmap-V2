# Local SQL Server for development.
#
# Apple Silicon (M-series) has no native SQL Server build, so we run the
# linux/amd64 image under Rancher Desktop's emulation. This is for LOCAL DEV only;
# production uses a real SQL Server / Azure SQL instance.
#
# Local dev: just the database  ->  docker compose up -d sqlserver
# Full stack (built app + database)  ->  docker compose up --build
# The SA password can be overridden with the MSSQL_SA_PASSWORD env var.
name: csub-runner-roadmap-v2
services:
  app:
    build: .
    container_name: csub-app
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # The app creates the database + schema and seeds defaults on startup.
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=csub_admissions;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Csub_Local_Dev_2026!};TrustServerCertificate=True;Encrypt=False"
      Jwt__Secret: "${JWT_SECRET:-change-me-in-production-0123456789-abcdefghijklmnopqrstuvwxyz}"
      Admin__DefaultEmail: "${ADMIN_DEFAULT_EMAIL:-admin@csub.edu}"
      Admin__DefaultPassword: "${ADMIN_DEFAULT_PASSWORD:-admin123}"
      LocalLogin__Username: "${LOCAL_LOGIN_USERNAME:-localadmin}"
      LocalLogin__Password: "${LOCAL_LOGIN_PASSWORD:-Local_Admin_2026!}"
      # Optional: AzureAd__ClientId / AzureAd__TenantId, Integration__DefaultKey,
      # ApiCheck__EncryptionKey (64-hex), Cors__Origin.
    ports:
      - "8080:8080"
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: csub-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Csub_Local_Dev_2026!}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - csub_sqlserver_data:/var/opt/mssql
    healthcheck:
      # /opt/mssql-tools18/bin uses the newer tools; -C trusts the dev cert.
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD:-Csub_Local_Dev_2026!}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

volumes:
  csub_sqlserver_data:
